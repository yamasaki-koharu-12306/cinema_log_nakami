spring.application.name=mysite

# PostgreSQL connection (override with environment variables in production)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/rescreen}
spring.datasource.username=${DATABASE_USERNAME:student}
spring.datasource.password=${DATABASE_PASSWORD:himitu}

# JPA / SQL initialization
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# schema.sql is safe to execute repeatedly because it uses IF NOT EXISTS.
# sample-data.sql is not executed automatically, so production posts are never overwritten.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.encoding=UTF-8
spring.jpa.defer-datasource-initialization=true

# Thymeleaf
spring.thymeleaf.cache=false

# Admin account bootstrap
# 初回起動時、admin_usersが空の場合だけ管理者をDBへ作成します。
# Render公開時はADMIN_USERNAMEとADMIN_PASSWORDを環境変数で上書きしてください。
app.admin.bootstrap-username=${ADMIN_USERNAME:rescreen_admin}
app.admin.bootstrap-password=${ADMIN_PASSWORD:rescreen-local-2026}


server.error.whitelabel.enabled=false

# Affiliate settings
# Amazon Associate tag example: example-22
app.affiliate.amazon-tag=${AMAZON_ASSOCIATE_TAG:}
app.affiliate.disclosure=${AFFILIATE_DISCLOSURE:当サイトはアフィリエイト広告を利用しています。}

# Public pages read the database on every request.
# Open public pages also check for new posts every 15 seconds.
app.public-refresh-interval-ms=${PUBLIC_REFRESH_INTERVAL_MS:15000}

# Session security
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
