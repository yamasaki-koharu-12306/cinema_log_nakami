spring.application.name=mysite

# PostgreSQL connection
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rescreen}?sslmode=require
spring.datasource.username=${DB_USER:student}
spring.datasource.password=${DB_PASSWORD:himitu}

# JPA / SQL initialization
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.encoding=UTF-8
spring.jpa.defer-datasource-initialization=true

# Thymeleaf
spring.thymeleaf.cache=false

# Admin account bootstrap
app.admin.bootstrap-username=${ADMIN_USERNAME:rescreen_admin}
app.admin.bootstrap-password=${ADMIN_PASSWORD:rescreen-local-2026}

server.error.whitelabel.enabled=false

# Affiliate settings
app.affiliate.amazon-tag=${AMAZON_ASSOCIATE_TAG:}
app.affiliate.disclosure=${AFFILIATE_DISCLOSURE:当サイトはアフィリエイト広告を利用しています。}

# Public pages
app.public-refresh-interval-ms=${PUBLIC_REFRESH_INTERVAL_MS:15000}

# Session security
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Render
server.port=${PORT:8080}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.enabled=true
management.endpoint.health.show-details=never