<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>中身｜Cinema Log</title>
    <meta name="description" content="映画の記録、感情の記録。">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="landing-page">
<header th:replace="~{fragments/layout :: header}"></header>

<main class="cinema-intro">
    <div class="cinema-intro__light" aria-hidden="true"></div>
    <div class="cinema-intro__grain" aria-hidden="true"></div>
    <div class="cinema-intro__frame cinema-intro__frame--top" aria-hidden="true"></div>
    <div class="cinema-intro__frame cinema-intro__frame--bottom" aria-hidden="true"></div>

    <a class="cinema-title page-link"
       th:href="@{/movies}"
       aria-label="Re:Screen 映画レビュー一覧へ">
        <span class="cinema-title__line" aria-hidden="true"></span>
        <span class="cinema-title__word">
            <span class="cinema-title__re">中身｜</span>
            <span class="cinema-title__screen">Cinema Log</span>
        </span>
        <span class="cinema-title__subtitle">FILMS, FEELINGS AND MYSELF</span>
    </a>

    <p class="cinema-intro__hint">
        <span>ENTER</span>
        <i aria-hidden="true"></i>
    </p>
</main>

<div class="page-transition" aria-hidden="true">
    <span></span>
    <span></span>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
